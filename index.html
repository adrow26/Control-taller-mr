async function insertarTrabajo(mecanico_id, orden_trabajo, repuestos, costo_rep, costo_trab) {
  const total = parseFloat(costo_rep || 0) + parseFloat(costo_trab || 0)
  await supabaseClient.from('trabajos').insert([{
    mecanico_id,
    orden_trabajo,
    repuestos_cambiados: repuestos,
    costo_repuesto: parseFloat(costo_rep || 0),
    costo_trabajo: parseFloat(costo_trab || 0),
    total,
    estado: 'pendiente'
  }])
}

async function actualizarTrabajoExistente(id, mecanico_id, orden_trabajo, repuestos, costo_rep, costo_trab) {
  const total = parseFloat(costo_rep || 0) + parseFloat(costo_trab || 0)
  const {error} = await supabaseClient.from('trabajos').update({
    mecanico_id,
    orden_trabajo,
    repuestos_cambiados: repuestos,
    costo_repuesto: parseFloat(costo_rep || 0),
    costo_trabajo: parseFloat(costo_trab || 0),
    total
  }).eq('id', id)
  return !error
}

async function obtenerTrabajos(filtroFecha = null, mecanico_id = null) {
  let query = supabaseClient.from('trabajos').select('*, mecanicos(nombre)').order('created_at', {ascending: false})
  if(mecanico_id) query = query.eq('mecanico_id', mecanico_id)

  let {data} = await query
  if(!data) return []

  if(filtroFecha) {
    const hoy = new Date()
    data = data.filter(t => {
      const fecha = new Date(t.created_at)
      if(filtroFecha === 'dia') return fecha.toDateString() === hoy.toDateString()
      if(filtroFecha === 'semana') return fecha >= new Date(hoy.getTime() - 7*24*60*60*1000)
      if(filtroFecha === 'mes') return fecha.getMonth() === hoy.getMonth() && fecha.getFullYear() === hoy.getFullYear()
      return true
    })
  }
  return data
}

async function cambiarEstadoTrabajo(id) {
  const btn = event.target
  const estadoActual = btn.dataset.estado || 'pendiente'
  const nuevoEstado = estadoActual === 'pagado'? 'pendiente' : 'pagado'

  const {error} = await supabaseClient.from('trabajos').update({estado: nuevoEstado}).eq('id', id)
  if(!error) {
    mostrarAviso(`Orden marcada como ${nuevoEstado.toUpperCase()} ✅`)
    if(idTrabajoEdicion === id) cancelarEdicion();
    document.getElementById('tablaTrabajos').innerHTML = await cargarTablaTrabajos()
  } else {
    mostrarAviso('Error al cambiar estado')
    console.error(error)
  }
}

function formatearRepuestosHistorial(repuestosStr) {
  if (!repuestosStr || repuestosStr === '-' || repuestosStr === 'S/R') return '-';
  const { items } = parseRepuestos(repuestosStr);
  if (items.length === 0) return '-';
  
  return `<ol class="repuestos-lista-historial">
    ${items.map(item => `<li>${item.detalle} (Bs ${item.precio.toFixed(2)})</li>`).join('')}
  </ol>`;
}

async function cargarTablaTrabajos() {
  const trabajos = await obtenerTrabajos()
  return trabajos.map(t => {
    const estado = t.estado || 'pendiente'
    const claseEstado = estado === 'pagado'? 'estado-pagado' : 'estado-pendiente'
    const claseBoton = estado === 'pagado'? 'btn-pendiente' : 'btn-pagado'
    const textoBoton = estado === 'pagado'? 'Marcar Pendiente' : 'Marcar Pagado'
    
    const botonEditar = estado === 'pendiente' ? 
      `<button class="btn-editar" onclick="prepararEdicionTrabajo(${t.id}, '${escapeJsonStr(t.orden_trabajo)}', '${escapeJsonStr(t.repuestos_cambiados)}', ${t.costo_trabajo}, ${t.mecanico_id})">Editar</button>` : '';

    return `
    <tr>
      <td>${t.created_at? new Date(t.created_at).toLocaleDateString() : '-'}</td>
      <td>${t.mecanicos?.nombre || 'Sin asignar'}</td>
      <td>${t.orden_trabajo}</td>
      <td>${formatearRepuestosHistorial(t.repuestos_cambiados)}</td>
      <td>Bs ${parseFloat(t.costo_repuesto || 0).toFixed(2)}</td>
      <td>Bs ${parseFloat(t.costo_trabajo || 0).toFixed(2)}</td>
      <td><b>Bs ${parseFloat(t.total || 0).toFixed(2)}</b></td>
      <td class="${claseEstado}">${estado.toUpperCase()}</td>
      <td>
        <div class="row" style="gap:5px;">
          <button class="${claseBoton}" data-estado="${estado}" onclick="cambiarEstadoTrabajo(${t.id})">${textoBoton}</button>
          ${botonEditar}
        </div>
      </td>
    </tr>
  `}).join('')
}

function escapeJsonStr(str) {
  if(!str) return '';
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}

function prepararEdicionTrabajo(id, orden, repuestosStr, costoTrabajo, mecanicoId) {
  idTrabajoEdicion = id;
  window.scrollTo({top: 0, behavior: 'smooth'});
  
  document.getElementById('mecanico').value = mecanicoId;
  document.getElementById('orden').value = orden;
  document.getElementById('costo_trab').value = costoTrabajo;
  
  const contenedor = document.getElementById('contenedorRepuestos');
  contenedor.innerHTML = '';
  
  const { items } = parseRepuestos(repuestosStr);
  if (items.length === 0) {
    agregarFilaRepuesto();
  } else {
    items.forEach(item => {
      agregarFilaRepuesto(item.detalle, item.precio);
    });
  }
  
  calcularTotalRepuestos();
  
  document.getElementById('tituloFormulario').innerText = `Editar Orden de Trabajo (ID: ${id})`;
  const btnGuardar = document.getElementById('btnGuardarOrden');
  btnGuardar.innerText = 'Actualizar Orden';
  btnGuardar.style.background = '#ff9800';
  
  document.getElementById('btnCancelarEdicion').style.display = 'inline-block';
}

function cancelarEdicion() {
  idTrabajoEdicion = null;
  document.getElementById('tituloFormulario').innerText = 'Nueva Orden de Trabajo';
  const btnGuardar = document.getElementById('btnGuardarOrden');
  btnGuardar.innerText = 'Guardar Orden';
  btnGuardar.style.background = '#2196F3';
  document.getElementById('btnCancelarEdicion').style.display = 'none';
  
  document.getElementById('orden').value = '';
  document.getElementById('costo_trab').value = '';
  document.getElementById('contenedorRepuestos').innerHTML = '';
  agregarFilaRepuesto();
  calcularTotalRepuestos();
}

          </div>
          <button onclick="agregarFilaRepuesto()" style="padding: 2px 10px; font-size:12px; background:#555; margin-top:2px;">+ Añadir repuesto</button>
        </div>
      </div>

      <div class="row" style="margin-top: 10px;">
        <input id="costo_rep" type="number" step="0.01" placeholder="Total repuestos Bs" readonly style="width: 145px; background: #222; color: #aaa;">
        <input id="costo_trab" type="number" step="0.01" placeholder="Costo trabajo Bs" oninput="calcularTotal()" style="width: 145px">

      <div class="row">
        <button id="btnGuardarOrden" onclick="guardarTrabajo()">Guardar Orden</button>

      <hr>

        <tr><th>Fecha</th><th>Mecánico</th><th>Orden</th><th>Repuestos</th><th>Costo Rep</th><th>Costo Trab</th><th>Total</th><th>Estado</th><th>Acción</th></tr>
        <tbody id="tablaTrabajos"></tbody>

    </div>
  `
  document.getElementById('tablaTrabajos').innerHTML = await cargarTablaTrabajos()

function agregarFilaRepuesto(detalle = '', precio = '') {
  const contenedor = document.getElementById('contenedorRepuestos');
  
  const inputDetalle = document.createElement('input');
  inputDetalle.className = 'rep-det';
  inputDetalle.placeholder = 'Repuesto';
  inputDetalle.value = detalle;
  inputDetalle.style.cssText = 'width:100%; margin:0; padding:5px;';
  
  const inputPrecio = document.createElement('input');
  inputPrecio.className = 'rep-pre';
  inputPrecio.type = 'number';
  inputPrecio.step = '0.01';
  inputPrecio.placeholder = 'Bs';
  inputPrecio.value = precio;
  inputPrecio.style.cssText = 'width:100%; margin:0; padding:5px;';
  inputPrecio.oninput = calcularTotalRepuestos;
  
  contenedor.appendChild(inputDetalle);
  contenedor.appendChild(inputPrecio);
}

function calcularTotalRepuestos() {
  const precios = document.getElementsByClassName('rep-pre');
  let totalRep = 0;
  for(let i=0; i<precios.length; i++) {
    totalRep += parseFloat(precios[i].value || 0);
  }
  document.getElementById('costo_rep').value = totalRep.toFixed(2);
  calcularTotal();
}

function calcularTotal() {
  const rep = parseFloat(document.getElementById('costo_rep').value || 0)
  const trab = parseFloat(document.getElementById('costo_trab').value || 0)
  document.getElementById('total').innerText = `Total: Bs ${(rep + trab).toFixed(2)}`
}

function obtenerStringRepuestos() {
  const detalles = document.getElementsByClassName('rep-det');
  const precios = document.getElementsByClassName('rep-pre');
  let resultado = [];
  
  for(let i=0; i<detalles.length; i++) {
    const det = detalles[i].value.trim();
    const pre = parseFloat(precios[i].value || 0);
    if(det) {
      resultado.push(`${det} ${pre}`);
    }
  }
  return resultado.length > 0 ? resultado.join('\n') : 'S/R';
}

async function guardarTrabajo() {
  const mec = document.getElementById('mecanico').value
  const orden = document.getElementById('orden').value.trim()
  const costoTrabRaw = document.getElementById('costo_trab').value.trim()

  if(!costoTrabRaw || parseFloat(costoTrabRaw) <= 0) {
    alert('⚠️ Espacio Obligatorio: Debe llenar el costo del trabajo (Mano de Obra).')
    mostrarAviso('Llene el costo del trabajo')
    return
  }

  if(!mec ||!orden) return mostrarAviso('Selecciona mecánico y llena el número/detalle de orden')

  const repuestosString = obtenerStringRepuestos();
  const costoRep = document.getElementById('costo_rep').value;

  if (idTrabajoEdicion) {
    const exito = await actualizarTrabajoExistente(idTrabajoEdicion, mec, orden, repuestosString, costoRep, costoTrabRaw);
    if(exito) {
      mostrarAviso(`Orden ${orden} actualizada con éxito ✅`);
      mostrarTrabajos();
    } else {
      mostrarAviso('Error al actualizar la orden ❌');
    }
  } else {
    await insertarTrabajo(mec, orden, repuestosString, costoRep, costoTrabRaw);
    mostrarAviso(`Orden ${orden} guardada ✅`);
    mostrarTrabajos();
  }
}

async function reporteGanancias(tipo, mecanico_id = null) {
  const trabajos = await obtenerTrabajos(tipo, mecanico_id)
  const hoy = new Date()
  let fecha_texto = 'Todos'
  if(tipo === 'dia') fecha_texto = hoy.toLocaleDateString()
  if(tipo === 'semana') fecha_texto = `${new Date(hoy.getTime() - 7*24*60*60*1000).toLocaleDateString()} al ${hoy.toLocaleDateString()}`
  if(tipo === 'mes') fecha_texto = hoy.toLocaleDateString('es', {month: 'long', year: 'numeric'})

  const agrupado = {}
  trabajos.forEach(t => {
    const nombre = t.mecanicos?.nombre || 'Sin asignar'
    if(!agrupado[nombre]) agrupado[nombre] = {trabajos: [], ganancia: 0}
    agrupado[nombre].trabajos.push({
      orden: t.orden_trabajo,
      repuestos: t.repuestos_cambiados,
      fecha: new Date(t.created_at).toLocaleDateString(),
      ganancia: parseFloat(t.costo_trabajo || 0),
      estado: t.estado
    })
    agrupado[nombre].ganancia += parseFloat(t.costo_trabajo || 0)
  })

  return [Object.keys(agrupado).map(nombre => [nombre, agrupado[nombre].trabajos, agrupado[nombre].ganancia]), fecha_texto]
}

function parseRepuestos(repuestosStr) {
  if (!repuestosStr || repuestosStr === 'S/R' || repuestosStr === '-') return {items: [], total: 0}

  const items = []
  const lineas = repuestosStr.split('\n')

  lineas.forEach(linea => {
    linea = linea.trim()
    if (!linea) return

    const match = linea.match(/(.+?)\s+(\d+\.?\d*)$/)
    if (match) {
      items.push({detalle: match[1].trim(), precio: parseFloat(match[2])})
    } else {
      items.push({detalle: linea, precio: 0})
    }
  })

  const total = items.reduce((sum, item) => sum + item.precio, 0)
  return {items, total}
}

async function generarPDF() {
  const {jsPDF} = window.jspdf
  const doc = new jsPDF()

  const logoUrl = 'https://hzxhvvxjfedqvtlnogmj.supabase.co/storage/v1/object/public/logo/LogoOficialTallerMora1.png'
  const logoBase64 = await urlToBase64(logoUrl)
  doc.addImage(logoBase64, 'PNG', 150, 10, 40, 25)

  doc.setFont('helvetica', 'bold')
  doc.setFontSize(20)
  doc.text('TALLER DE MOTOS - MORA', 20, 20)
  doc.setFont('helvetica', 'normal')
  doc.setFontSize(9)
  doc.text('Plataforma creada y diseñada por ADROW-CONSULTORES-SRL', 20, 26)
  doc.setFontSize(11)
  doc.text(`Período: ${tipoReporteActual} - ${fechaTextoActual}`, 20, 34)
  doc.text(`Mecánico: ${mecanicoNombreActual}`, 20, 39)
  doc.text(`Fecha emisión: ${new Date().toLocaleString()}`, 20, 44)

  const colX = [20, 55, 115, 150, 170]
  const colWidth = [35, 60, 35, 20, 25]
  let y = 58

  doc.setFontSize(11)
  doc.setFont('helvetica', 'bold')
  doc.rect(20, y-5, 170, 12)
  doc.text('Mecánico', colX[0], y)
  doc.text('Orden/Detalle', colX[1], y)
  doc.text('Repuestos', colX[2], y)
  doc.text('Monto', colX[3], y)
  doc.text('Ganancia', colX[4], y)
  doc.line(colX[0], y+3, colX[4]+colWidth[4], y+3)
  y += 12

  doc.setFont('helvetica', 'normal')
  doc.setFontSize(9)
  let totalGeneral = 0

  datosReporteActuales.forEach(d => {
    const nombre = d[0]
    const trabajos = d[1]
    const ganancia = d[2]

    if(y > 270) {doc.addPage(); y = 20}
    doc.rect(20, y-5, 170, 7)
    doc.setFont('helvetica', 'bold')
    doc.text(nombre, colX[0], y)
    doc.text(`Total: ${trabajos.length} trabajos`, colX[1], y)
    doc.text(`Bs ${ganancia.toFixed(2)}`, colX[4], y)
    doc.setFont('helvetica', 'normal')
    y += 7

    trabajos.forEach(t => {
      if(y > 270) {doc.addPage(); y = 20}
      const estado = t.estado === 'pagado'? '[PAGADO]' : '[PENDIENTE]'

      const detalleText = `- Ord ${t.orden} ${estado}`
      const detalleLines = doc.splitTextToSize(detalleText, colWidth[1]-2)

      const {items, total} = parseRepuestos(t.repuestos)

      let repuestosLines = []
      if (items.length === 0) {
        repuestosLines = ['S/R']
      } else {
        items.forEach((item, index) => {
          repuestosLines.push(`${index + 1}. ${item.detalle} | Bs ${item.precio.toFixed(2)}`)
        })
        repuestosLines.push('---')
        repuestosLines.push(`TOTAL: Bs ${total.toFixed(2)}`)
      }

      const linesCount = Math.max(detalleLines.length, repuestosLines.length, 1)
      const currentRowHeight = linesCount * 6 + 4

      doc.rect(20, y-5, 170, currentRowHeight)
      doc.line(colX[0], y-5, colX[0], y-5+currentRowHeight)
      doc.line(colX[1], y-5, colX[1], y-5+currentRowHeight)
      doc.line(colX[2], y-5, colX[2], y-5+currentRowHeight)
      doc.line(colX[3], y-5, colX[3], y-5+currentRowHeight)

      doc.text(detalleLines, colX[1], y)
      doc.text(repuestosLines, colX[2], y+2)
      doc.text(`Bs ${t.ganancia.toFixed(2)}`, colX[3], y)

      y += currentRowHeight
    })
    totalGeneral += ganancia
    y += 3
  })

  doc.rect(20, y-5, 170, 12)
  doc.line(20, y+3, 190, y+3)
  y += 8
  doc.setFontSize(14)
  doc.setFont('helvetica', 'bold')
  doc.text('TOTAL MANO DE OBRA:', colX[0], y)
  doc.text(`Bs ${totalGeneral.toFixed(2)}`, colX[4], y)

  doc.save(`reporte_${tipoReporteActual}_${Date.now()}.pdf`)
}

function urlToBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image()
    img.crossOrigin = 'anonymous'
    img.onload = () => {
      const canvas = document.createElement('canvas')
      canvas.width = img.width
      canvas.height = img.height
      canvas.getContext('2d').drawImage(img, 0, 0)
      resolve(canvas.toDataURL('image/png'))
    }
    img.onerror = reject
    img.src = url
  })
}

async function cargarReporte(tipo) {
  tipoReporteActual = tipo
  const select = document.getElementById('filtroMec')
  const mecId = select?.value
  mecanicoNombreActual = mecId === 'todos'? 'Todos' : select.options[select.selectedIndex].text

  const [datos, fechaTexto] = await reporteGanancias(tipo, mecId === 'todos'? null : mecId)
  datosReporteActuales = datos
  fechaTextoActual = fechaTexto

  document.getElementById('fechaLabel').innerText = `Período: ${fechaTexto}`
  const total = datos.reduce((sum, d) => sum + (d[2] || 0), 0)
  document.getElementById('totalGeneral').innerText = `Ganancia Mano de Obra: Bs ${total.toFixed(2)}`

  const tbody = document.getElementById('tablaReporte')
  tbody.innerHTML = datos.length > 0? datos.map(d => {
    const nombre = d[0]
    const trabajos = d[1]
    const ganancia = d[2]
    const detalleTrabajos = trabajos.map(t => {
      const estado = t.estado === 'pagado'? '🟢' : '🟠'
      const repuestosFormateados = t.repuestos && t.repuestos !== 'S/R' ? 
        `<br><small>Repuestos:</small>${formatearRepuestosHistorial(t.repuestos)}` : ' - Sin repuestos';
      return `<div style="text-align:left; font-size:12px; margin-bottom:5px;">${estado} Ord ${t.orden}: Bs ${t.ganancia.toFixed(2)} ${repuestosFormateados}</div>`
    }).join('')
    const fechas = [...new Set(trabajos.map(t => t.fecha))].join(', ')
    return `<tr><td>${nombre}</td><td>${trabajos.length}<br>${detalleTrabajos}</td><td>Bs ${ganancia.toFixed(2)}<br><span style="font-size:11px; color:grey">${fechas}</span></td></tr>`
  }).join('') : '<tr><td colspan="3">Sin datos en este período</td></tr>'
}
