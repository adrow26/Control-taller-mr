async function verificarUsuario(usuario, password) {
  const {data} = await supabaseClient.from('usuarios').select('*').eq('usuario', usuario).eq('password', password)
  return data && data.length > 0

async function crearUsuario(usuario, password) {

async function insertarMecanico(nombre, telefono, especialidad) {
  await supabaseClient.from('mecanicos').insert([{nombre, telefono, especialidad}])

async function obtenerMecanicos() {

async function insertarTrabajo(mecanico_id, orden_trabajo, repuestos, costo_rep, costo_trab) {
  const total = parseFloat(costo_rep || 0) + parseFloat(costo_trab || 0)
  await supabaseClient.from('trabajos').insert([{
    mecanico_id,
    orden_trabajo,
    repuestos_cambiados: repuestos,
    costo_repuesto: parseFloat(costo_rep || 0),
    costo_trabajo: parseFloat(costo_trab || 0),
    total,
    estado: 'pendiente'
  }])
}

async function obtenerTrabajos(filtroFecha = null, mecanico_id = null) {
  let query = supabaseClient.from('trabajos').select('*, mecanicos(nombre)').order('created_at', {ascending: false})
  if(mecanico_id) query = query.eq('mecanico_id', mecanico_id)

  let {data} = await query
  if(!data) return []

  if(filtroFecha) {
    const hoy = new Date()
    data = data.filter(t => {
      const fecha = new Date(t.created_at)
      if(filtroFecha === 'dia') return fecha.toDateString() === hoy.toDateString()
      if(filtroFecha === 'semana') return fecha >= new Date(hoy.getTime() - 7*24*60*60*1000)
      if(filtroFecha === 'mes') return fecha.getMonth() === hoy.getMonth() && fecha.getFullYear() === hoy.getFullYear()
      return true
    })
  }
  return data
}

async function cambiarEstadoTrabajo(id) { // <- ahora solo recibe id
  const btn = event.target
  const estadoActual = btn.dataset.estado || 'pendiente'
  const nuevoEstado = estadoActual === 'pagado'? 'pendiente' : 'pagado'

  const {error} = await supabaseClient.from('trabajos').update({estado: nuevoEstado}).eq('id', id)
  if(!error) {
    mostrarAviso(`Orden marcada como ${nuevoEstado.toUpperCase()} ✅`)
    document.getElementById('tablaTrabajos').innerHTML = await cargarTablaTrabajos()
  } else {
    mostrarAviso('Error al cambiar estado')
    console.error(error)
  }
}

async function cargarTablaTrabajos() {
  const trabajos = await obtenerTrabajos()
  return trabajos.map(t => {
    const estado = t.estado || 'pendiente'
    const claseEstado = estado === 'pagado'? 'estado-pagado' : 'estado-pendiente'
    const claseBoton = estado === 'pagado'? 'btn-pendiente' : 'btn-pagado'
    const textoBoton = estado === 'pagado'? 'Marcar Pendiente' : 'Marcar Pagado'

    return `
    <tr>
      <td>${t.created_at? new Date(t.created_at).toLocaleDateString() : '-'}</td>
      <td>${t.mecanicos?.nombre || 'Sin asignar'}</td>
      <td>${t.orden_trabajo}</td>
      <td>${t.repuestos_cambiados || '-'}</td>
      <td>Bs ${parseFloat(t.costo_repuesto || 0).toFixed(2)}</td>
      <td>Bs ${parseFloat(t.costo_trabajo || 0).toFixed(2)}</td>
      <td><b>Bs ${parseFloat(t.total || 0).toFixed(2)}</b></td>
      <td class="${claseEstado}">${estado.toUpperCase()}</td>
      <td><button class="${claseBoton}" data-estado="${estado}" onclick="cambiarEstadoTrabajo(${t.id})">${textoBoton}</button></td>
    </tr>
  `}).join('')
}

async function iniciarSesion() {
  const u = document.getElementById('usuario').value.trim()
  const p = document.getElementById('password').value.trim()
  if(await verificarUsuario(u, p)) mostrarApp()
  else document.getElementById('mensajeLogin').innerText = '❌ Usuario o contraseña incorrectos'
}

async function registrar() {
  const u = document.getElementById('usuario').value.trim()
  const p = document.getElementById('password').value.trim()
  const msg = document.getElementById('mensajeLogin')
  if(!u ||!p) {msg.innerText = '⚠️ Completa usuario y contraseña'; msg.style.color = 'orange'; return}
  if(await crearUsuario(u, p)) {msg.innerText = '✅ Usuario creado'; msg.style.color = 'green'}
  else {msg.innerText = '❌ Ese usuario ya existe'; msg.style.color = 'red'}
}

async function reporteGanancias(tipo, mecanico_id = null) {
  const trabajos = await obtenerTrabajos(tipo, mecanico_id)
  const hoy = new Date()
  let fecha_texto = 'Todos'
  if(tipo === 'dia') fecha_texto = hoy.toLocaleDateString()
  if(tipo === 'semana') fecha_texto = `${new Date(hoy.getTime() - 7*24*60*60*1000).toLocaleDateString()} al ${hoy.toLocaleDateString()}`
  if(tipo === 'mes') fecha_texto = hoy.toLocaleDateString('es', {month: 'long', year: 'numeric'})

  const agrupado = {}
  trabajos.forEach(t => {
    const nombre = t.mecanicos?.nombre || 'Sin asignar'
    if(!agrupado[nombre]) agrupado[nombre] = {trabajos: [], ganancia: 0}
    agrupado[nombre].trabajos.push({
      orden: t.orden_trabajo,
      repuestos: t.repuestos_cambiados,
      fecha: new Date(t.created_at).toLocaleDateString(),
      ganancia: parseFloat(t.costo_trabajo || 0),
      estado: t.estado
    })
    agrupado[nombre].ganancia += parseFloat(t.costo_trabajo || 0)
  })

  return [Object.keys(agrupado).map(nombre => [nombre, agrupado[nombre].trabajos, agrupado[nombre].ganancia]), fecha_texto]
}

async function generarPDF() {
  const {jsPDF} = window.jspdf
  const doc = new jsPDF()
  
  // Cargar logo desde Supabase Storage
  const logoUrl = 'https://hzxhvvxjfedqvtlnogmj.supabase.co/storage/v1/object/public/logo/LogoOficialTallerMora1.png'
  const logoBase64 = await urlToBase64(logoUrl)
  
  doc.addImage(logoBase64, 'PNG', 150, 10, 40, 25) // arriba derecha
  doc.setFont('helvetica', 'bold') // negrilla
  doc.setFontSize(20) // antes 16, ahora 20
  doc.text('TALLER DE MOTOS - MORA', 20, 20)
  doc.setFontSize(6)
  doc.text('Plataforma creada y diseñada por ADROW-CONSULTORES', 20, 24)
  doc.setFontSize(12)
  doc.text(`Período: ${tipoReporteActual} - ${fechaTextoActual}`, 20, 37)
  doc.text(`Mecánico: ${mecanicoNombreActual}`, 20, 41)
  doc.text(`Fecha emisión: ${new Date().toLocaleString()}`, 20, 46)

  let y = 65 // bajé el y para que no choque con el logo
  doc.setFontSize(12)
  doc.text('Mecánico', 20, y)
  doc.text('Orden/Detalle', 55, y)
  doc.text('Repuestos', 85, y)
  doc.text('Ganancia', 160, y)
  doc.line(20, y+3, 190, y+3)
  y += 10

  doc.setFont('helvetica', 'normal')
  doc.setFontSize(10)
  let totalGeneral = 0
  datosReporteActuales.forEach(d => {
    const nombre = d[0]
    const trabajos = d[1]
    const ganancia = d[2]

    if(y > 270) {doc.addPage(); y = 20}
    doc.setFont('helvetica', 'bold')
    doc.text(nombre, 20, y)
    doc.text(`Total: ${trabajos.length} trabajos`, 55, y)
    doc.text(`Bs ${ganancia.toFixed(2)}`, 160, y)
    y += 8

    trabajos.forEach(t => {
      if(y > 270) {doc.addPage(); y = 20}
      const estado = t.estado === 'pagado'? '[PAGADO]' : '[PENDIENTE]'
      const texto = `- Ord ${t.orden} ${estado}: ${t.repuestos || 'S/R'} Bs ${t.ganancia.toFixed(2)}`
      doc.text(texto.substring(0, 55), 55, y)
      y += 6
    })
    totalGeneral += ganancia
    y += 4
  })

  doc.line(20, y, 190, y)
  y += 8
  doc.setFontSize(14)
  doc.text('TOTAL MANO DE OBRA:', 20, y)
  doc.text(`Bs ${totalGeneral.toFixed(2)}`, 160, y)
  doc.save(`reporte_${tipoReporteActual}_${Date.now()}.pdf`)
}

function urlToBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image()
    img.crossOrigin = 'anonymous'
    img.onload = () => {
      const canvas = document.createElement('canvas')
      canvas.width = img.width
      canvas.height = img.height
      canvas.getContext('2d').drawImage(img, 0, 0)
      resolve(canvas.toDataURL('image/png'))
    }
    img.onerror = reject
    img.src = url
  })
}

async function cargarReporte(tipo) {
  tipoReporteActual = tipo
  const select = document.getElementById('filtroMec')
  const mecId = select?.value
  mecanicoNombreActual = mecId === 'todos'? 'Todos' : select.options[select.selectedIndex].text

  const [datos, fechaTexto] = await reporteGanancias(tipo, mecId === 'todos'? null : mecId)
  datosReporteActuales = datos
  fechaTextoActual = fechaTexto

  document.getElementById('fechaLabel').innerText = `Período: ${fechaTexto}`
  const total = datos.reduce((sum, d) => sum + (d[2] || 0), 0)
  document.getElementById('totalGeneral').innerText = `Ganancia Mano de Obra: Bs ${total.toFixed(2)}`

  const tbody = document.getElementById('tablaReporte')
  tbody.innerHTML = datos.length > 0? datos.map(d => {
    const nombre = d[0]
    const trabajos = d[1]
    const ganancia = d[2]
    const detalleTrabajos = trabajos.map(t => {
      const estado = t.estado === 'pagado'? '🟢' : '🟠'
      return `<div style="text-align:left; font-size:12px">${estado} Ord ${t.orden}: ${t.repuestos || 'Sin repuestos'} - Bs ${t.ganancia.toFixed(2)}</div>`
    }).join('')
    const fechas = [...new Set(trabajos.map(t => t.fecha))].join(', ')
    return `<tr><td>${nombre}</td><td>${trabajos.length}<br>${detalleTrabajos}</td><td>Bs ${ganancia.toFixed(2)}<br><span style="font-size:11px; color:grey">${fechas}</span></td></tr>`
  }).join('') : '<tr><td colspan="3">Sin datos en este período</td></tr>'
}

      <select id="filtroMec" onchange="cargarReporte(tipoReporteActual)" style="width: 300px">
        <option value="todos">Todos</option>
        ${mecanicosCache.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('')}
      </select>
      <div class="row">
        <button onclick="cargarReporte('dia')">Hoy</button>
        <button onclick="cargarReporte('semana')">Semana</button>
        <button onclick="cargarReporte('mes')">Mes</button>
      </div>
      <p id="fechaLabel">Período: </p>
      <p id="totalGeneral" style="font-size: 20px; font-weight: bold; color: #4caf50">Ganancia Mano de Obra: Bs 0.00</p>
      <button onclick="generarPDF()">📄 Exportar PDF</button>
      <hr>
      <table>
        <tr><th>Mecánico</th><th>Trabajos Detallados</th><th>Ganancia Mano de Obra + Fechas</th></tr>
        <tbody id="tablaReporte"></tbody>
      </table>
      <button onclick="mostrarApp()">← Volver al menú</button>
    </div>
  `
  setTimeout(() => cargarReporte('dia'), 100)
}
